<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="./output.css">
</head>

<body class="flex h-screen w-full items-center justify-center bg-gray-50 font-sans">

  <form class="flex w-[320px] flex-col items-center rounded-2xl border bg-white p-10 space-y-6">

    <header class="flex w-full items-center justify-center gap-2 text-xl text-slate-700">
      <span class="font-bold">Virtual Learning</span>
    </header>

    <main class="w-full space-y-3">

      <input
        type="text"
        placeholder="Username..."
        class="username w-full h-10 rounded-md border px-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
      />

      <input
        type="password"
        placeholder="Password..."
        class="password w-full h-10 rounded-md border px-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
      />

      <div class="flex items-center gap-2 text-sm select-none">
        <input type="checkbox" id="remember-me" />
        <label for="remember-me">Remember me</label>
      </div>

    </main>

    <footer class="w-full space-y-5">

      <button class="login-button w-full h-10 rounded-md bg-blue-600 text-white hover:opacity-90 transition">
        Login
      </button>

      <div class="flex items-center justify-center relative">
        <div class="w-full h-px bg-gray-200"></div>
        <span class="absolute bg-white px-3 text-xs text-gray-400">
          Continue with
        </span>
      </div>

      <button class="flex w-full items-center justify-center gap-2 rounded-md border bg-gray-100 py-2 text-sm hover:bg-gray-50 transition">
        <span>Login with Google</span>
      </button>

    </footer>

  </form>

 <div class="modal-screen hidden fixed inset-0 items-center justify-center bg-black/10 backdrop-blur-sm">

  <div class="w-[320px] rounded-lg bg-white p-6 shadow-lg flex flex-col items-center gap-4 text-center">

    <p class="font-medium"> Login Successfuly</p>

    <button class="rounded-md bg-blue-500 px-4 py-1 text-white hover:opacity-80 transition">
      Ok
    </button>

  </div>

</div>

  <script src="../src/app.js" type="module"></script>

</body>
</html>
